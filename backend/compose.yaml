services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: student_housing
      POSTGRES_USER: student_housing
      POSTGRES_PASSWORD: student_housing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_housing -d student_housing"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

