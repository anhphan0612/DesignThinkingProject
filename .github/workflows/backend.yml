name: Backend

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: student_housing
          POSTGRES_USER: student_housing
          POSTGRES_PASSWORD: student_housing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U student_housing -d student_housing"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production-change-before-deploy
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_SECURE_HSTS_SECONDS: "0"
      POSTGRES_DB: student_housing
      POSTGRES_USER: student_housing
      POSTGRES_PASSWORD: student_housing
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_TEST_DB: test_student_housing

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check --deploy
        env:
          DJANGO_SECURE_SSL_REDIRECT: "True"
          DJANGO_SECURE_HSTS_SECONDS: "31536000"

      - name: Run tests
        run: python manage.py test
